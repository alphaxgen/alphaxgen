<svg viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg" width="900" height="220">
  <defs>
    <style>
      @keyframes underline-grow {
        0%   { stroke-dashoffset: 600; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes fade-in {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }
      @keyframes gold-pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.4; }
      }
      @keyframes scan {
        0%   { transform: translateY(-4px); opacity: 0; }
        10%  { opacity: 1; }
        90%  { opacity: 1; }
        100% { transform: translateY(224px); opacity: 0; }
      }
    </style>
  </defs>

  <rect width="900" height="220" fill="#080808"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="55" x2="900" y2="55" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="165" x2="900" y2="165" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="220" y1="0" x2="220" y2="220" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="680" y1="0" x2="680" y2="220" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Scanline sweep -->
  <rect x="0" y="0" width="900" height="2" fill="rgba(255,215,0,0.06)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,220" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner brackets — TL -->
  <polyline points="0,30 0,0 30,0" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.8"/>
  <!-- Corner brackets — TR -->
  <polyline points="870,0 900,0 900,30" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.8"/>
  <!-- Corner brackets — BL -->
  <polyline points="0,190 0,220 30,220" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.8"/>
  <!-- Corner brackets — BR -->
  <polyline points="870,220 900,220 900,190" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.8"/>

  <!-- Top left label -->
  <text x="38" y="18" font-family="'Courier New', monospace" font-size="9" fill="#FFD700" letter-spacing="3" opacity="0.7">@ALPHAXGEN</text>
  <!-- Top right label -->
  <text x="862" y="18" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#FFD700" letter-spacing="3" opacity="0.7">PRODUCT · AI · CODE</text>

  <!-- Main title — ultra bold -->
  <text x="450" y="126" text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="76" font-weight="900"
    fill="#FFFFFF" letter-spacing="2">
    SPARSH KUMAR
    <animate attributeName="opacity" values="0;1" dur="0.6s" fill="freeze"/>
  </text>

  <!-- Gold underline — animated draw -->
  <line x1="155" y1="141" x2="745" y2="141"
    stroke="#FFD700" stroke-width="2.5"
    stroke-dasharray="590" stroke-dashoffset="590">
    <animate attributeName="stroke-dashoffset" values="590;0" dur="0.9s" begin="0.5s" fill="freeze"/>
  </line>

  <!-- Subtitle -->
  <text x="450" y="183" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="13" fill="#FFD700" letter-spacing="9" opacity="0">
    THEY CALL ME ALPHA
    <animate attributeName="opacity" values="0;0;1" keyTimes="0;0.5;1" dur="1.8s" fill="freeze"/>
  </text>

  <!-- Gold pulse dots -->
  <circle cx="130" cy="141" r="3" fill="#FFD700">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="770" cy="141" r="3" fill="#FFD700">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.5s" begin="1.2s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom label -->
  <text x="450" y="212" text-anchor="middle"
    font-family="'Courier New', monospace" font-size="8"
    fill="#333" letter-spacing="5">
    GRAPHIC ERA UNIVERSITY · INDIA · AI FOUNDER
  </text>
</svg>
